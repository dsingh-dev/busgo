name: CI ( continues integration )

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Frontend
      - name: Install frontend deps
        run: npm install

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm test

      # Backend
      - name: Install backend deps
        run: |
          cd backend
          npm install

      - name: Build backend
        run: |
          cd backend
          npm run build